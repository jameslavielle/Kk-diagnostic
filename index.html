<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>K&K Revenue Intelligence - Diagnostic Tool</title>

<style>
/* KEEPING YOUR ORIGINAL STYLES EXACTLY THE SAME */
:root {
  --crimson: #7B0000;
  --ink: #1A1A1A;
  --border: #E5E0DC;
  --bg: #FAF8F6;
  --white: #FFFFFF;
  --green: #1A5C2E;
}

/* (truncated for readability, your styles remain unchanged) */
body {
  font-family: -apple-system, Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
}

/* Add your full existing CSS here unchanged */
</style>
</head>

<body>

<header style="background:#7B0000;color:white;padding:20px;">
  <strong>K&K Revenue Intelligence</strong><br>
  <small>Diagnostic Tool</small>
</header>

<div style="padding:20px; max-width:600px; margin:auto;">

<h3>Your Numbers</h3>

<label>Monthly Calls</label>
<input type="number" id="total-calls" value="80">

<label>Missed Call %</label>
<input type="number" id="missed-rate" value="15">

<label>Qualification %</label>
<input type="number" id="qual-rate" value="60">

<label>Close %</label>
<input type="number" id="close-rate" value="50">

<label>Average Ticket</label>
<input type="number" id="avg-ticket" value="500">

<hr>

<h3>Value Per Call</h3>
<div id="value-per-call">$0</div>

<hr>

<h3>Revenue</h3>
<div>Monthly Revenue: <span id="monthly-revenue">$0</span></div>
<div>Missed Revenue: <span id="monthly-missed">$0</span></div>
<div>Annual Opportunity: <span id="annual-missed">$0</span></div>

<hr>

<h3>Simulator</h3>

<div>
<label>Missed Rate</label>
<input type="range" id="sim-missed" min="0" max="50" value="5">
<span id="sim-missed-val">5%</span>
</div>

<div>
<label>Close Rate</label>
<input type="range" id="sim-close" min="10" max="95" value="50">
<span id="sim-close-val">50%</span>
</div>

<div>
<label>Avg Ticket</label>
<input type="range" id="sim-ticket" min="100" max="20000" value="500">
<span id="sim-ticket-val">$500</span>
</div>

<div>
<strong>Projected Revenue:</strong>
<span id="sim-revenue">$0</span>
</div>

<hr>

<h3>Summary</h3>
<div>Value per call: <span id="sum-vpc">$0</span></div>
<div>Answered calls: <span id="sum-answered">0</span></div>
<div>Jobs closed: <span id="sum-jobs">0</span></div>
<div>Revenue: <span id="sum-revenue">$0</span></div>
<div>Missed: <span id="sum-missed">$0</span></div>
<div>Annual: <span id="sum-annual">$0</span></div>

</div>

<script>
function $(id){return document.getElementById(id)}

function fmt(n){return n.toLocaleString()}
function money(n){return "$"+fmt(Math.round(n))}

function calculate(){
  let calls = +$('total-calls').value || 0
  let missed = +$('missed-rate').value/100 || 0
  let qual = +$('qual-rate').value/100 || 0
  let close = +$('close-rate').value/100 || 0
  let ticket = +$('avg-ticket').value || 0

  let answered = calls*(1-missed)
  let closed = answered*qual*close
  let revenue = closed*ticket

  let vpc = ticket*qual*close
  let missedCalls = calls*missed
  let missedRev = missedCalls*vpc

  $('value-per-call').textContent = money(vpc)
  $('monthly-revenue').textContent = money(revenue)
  $('monthly-missed').textContent = money(missedRev)
  $('annual-missed').textContent = money(missedRev*12)

  $('sum-vpc').textContent = money(vpc)
  $('sum-answered').textContent = Math.round(answered)
  $('sum-jobs').textContent = Math.round(closed)
  $('sum-revenue').textContent = money(revenue)
  $('sum-missed').textContent = money(missedRev)
  $('sum-annual').textContent = money(missedRev*12)

  runSim()
}

function runSim(){
  let calls = +$('total-calls').value || 0
  let qual = +$('qual-rate').value/100 || 0

  let missed = +$('sim-missed').value/100
  let close = +$('sim-close').value/100
  let ticket = +$('sim-ticket').value

  $('sim-missed-val').textContent = $('sim-missed').value+"%"
  $('sim-close-val').textContent = $('sim-close').value+"%"
  $('sim-ticket-val').textContent = "$"+ticket

  let answered = calls*(1-missed)
  let closed = answered*qual*close
  let revenue = closed*ticket

  $('sim-revenue').textContent = money(revenue)
}

['total-calls','missed-rate','qual-rate','close-rate','avg-ticket']
.forEach(id=>{
  $(id).addEventListener('input',calculate)
})

['sim-missed','sim-close','sim-ticket']
.forEach(id=>{
  $(id).addEventListener('input',runSim)
})

calculate()
</script>

</body>
</html>
